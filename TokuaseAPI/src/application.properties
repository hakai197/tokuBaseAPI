spring.application.name=tokubase-api

# ?? MySQL Datasource ??????????????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/tokubase_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Postgres1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ???????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ?? Jackson ???????????????????????????????????????????????????????????????????
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.write-dates-as-timestamps=false

# ?? Server ????????????????????????????????????????????????????????????????????
server.port=8080

# ?? Springdoc / Swagger UI ????????????????????????????????????????????????????
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ?? Wiki Sync (Fandom / MediaWiki API) ???????????????????????????????????????
# Kamen Rider Wiki  ?  https://kamenrider.fandom.com
tokubase.wiki.rider.api-url=https://kamenrider.fandom.com/api.php
tokubase.wiki.rider.series-category=Kamen_Rider_television_series

# Power Rangers / Super Sentai Wiki  ?  https://powerrangers.fandom.com
tokubase.wiki.sentai.api-url=https://powerrangers.fandom.com/api.php
tokubase.wiki.sentai.series-category=Super_Sentai_Series

# HTTP request delay between wiki API calls (ms) ? be a good citizen
tokubase.wiki.request-delay-ms=300
# Maximum series to import per sync run (safety cap)
tokubase.wiki.max-series=150
# Thumbnail size requested from PageImages API (px)
tokubase.wiki.thumbnail-size=600

